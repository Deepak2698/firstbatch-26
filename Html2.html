<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML2</title>
</head>
<body>
    <div>
        <!-- Block Level Element 
         
            It occupies the complete row of your webpage
            div is also known as division tag
            you can provide height and width customizations
            Nesting of HTML elements is possible

         
        -->

            <div style="background-color: aliceblue; width: 200px; height: 200px;" > Div 1</div>
            <div style="background-color: antiquewhite;"> Div 2</div>
            <div style="background-color: aqua;"> Div 3</div>

        <!-- Inline Element 
         
            It occupies the content space only
            span tag can only have text values
            so, height and width customization is not possible
            Nesting of elements is not possible as it holds only text values

        -->

            <span style="background-color: rgb(37, 148, 148); width: 200px; height: 200px;"> Span 1</span>
            <span style="background-color: rgb(231, 231, 27);"> Span 2</span>
            <span style="background-color: rgb(211, 140, 54);"> Span 3</span>

    </div>
</body>
</html>
