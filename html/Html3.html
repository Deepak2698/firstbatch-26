<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Html3</title>
</head>
<body>

    <!-- Internal CSS -->
    
    <style>
        table,tr,th,td{
            border: 2px solid blue;
            text-align: center;
            border-collapse: collapse;
        }
    </style>
    <div>
        <!-- Tables -->

        <table style="width: 50%;"> <!-- opening table-->

            <tr><!-- table row --> <!-- First row -->

                <th> <!-- Table Head -->
                    Roll
                </th>
                <th>Domain</th>
                <th>Name</th>
            </tr>

            <tr> <!-- Second row -->
                <td><!-- table data -->
                    1
                </td>
                <td>Java</td>
                <td>x</td>
            </tr>

            <tr><!-- Third row -->
                <td>2</td>
                <td>MERN</td>
                <td>y</td>
            </tr>

            <tr><!-- Fourth row -->
                <td>3</td>
                <td>Python</td>
                <td>z</td>
            </tr>
        </table><!-- closing table -->


        <br>
        <hr>
        <br>

        <!-- Rowspan and Colspan 
         
            rowspan - Merging of rows
            colspan - Merging of columns

        -->
            <p>Rowspan</p>
        <table style="width: 50%;">
            <tr>
                <td>value</td>
                <td>value</td>
                <td rowspan="2">value</td>
            </tr>

            <tr>
                <td>value</td>
                <td rowspan="2">value</td>
            </tr>

            <tr>
                <td>value</td>
                <td>value</td>
            </tr>
        </table>

        <br>
        <hr>
        <br>

        <p>colspan</p>
        <table style="width: 50%;">

            <tr>
                <td>value</td>
                <td>value</td>
                <td>value</td>
            </tr>

            <tr>
                <td>value</td>
                <td colspan="2">value</td>
                
            </tr>

            <tr>
                <td colspan="3">value</td>
               
            </tr>
        </table>
    </div>
</body>
</html>
