<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List</title>
</head>
<body>
    <div>
        <!-- ordered lists -->

        <h2>Ordered List</h2>

        <ol>
            <li>HTML</li>
            <li>CSS</li>
            <li>JS</li>
        </ol>

        
        <ol type="A">
            <li>HTML</li>
            <li>CSS</li>
            <li>JS</li>
        </ol>

        <ol type="a">
            <li>HTML</li>
            <li>CSS</li>
            <li>JS</li>
        </ol>

        <ol type="I">
            <li>HTML</li>
            <li>CSS</li>
            <li>JS</li>
        </ol>

        <ol type="i">
            <li>HTML</li>
            <li>CSS</li>
            <li>JS</li>
        </ol>

        <br>
        <hr>
        <br>

        <!-- unordered list -->

        <h2>unordered list</h2>
        <ul>
            <li>HTML</li>
            <li>CSS</li>
            <li>JS</li>
        </ul>

        <ul style="list-style-type: armenian;">
            <li>HTML</li>
            <li>CSS</li>
            <li>JS</li>
        </ul>

        <ul style="list-style-type: circle;">
            <li>HTML</li>
            <li>CSS</li>
            <li>JS</li>
        </ul>

        <ul style="list-style-type: none;">
            <li>HTML</li>
            <li>CSS</li>
            <li>JS</li>
        </ul>
    </div>
</body>
</html>
