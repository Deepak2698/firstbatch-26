<!DOCTYPE html> <!-- Document type is HTML -->

<!-- Root Element -->
<html lang="en"> <!-- Language of the file is English -->
<head> <!-- Store Information -->
    <meta charset="UTF-8"> <!-- ASCII -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 
        
        name="viewport" = name viewport specifies the port on which the html file is viewed
        
        content="width=device-width, initial-scale=1.0" = width as diagonal width 
            initial scale means by default web page loads with scale of 1 that can be increased or decreased
    -->
            <!-- i love html -->
    <title>
        HTML
    </title>
</head>
<body>
    <h1 style="color: red;">
        Welcome to the Introduction session for HTML
    </h1>

    <!-- Tags, Elements and Attributes 
     
    
        Tags - Anything enclosed between opening < and closing > angular 
                    brackets are known as tags.

        Elements - Anything enclosed between opening and closing tags
                    are known as elements.


        Attributes - Additional Information about an element 

                    Attributes are mostly represented in <key> : <Value> pairs
    
    
    -->
</body>
</html>
