<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
</head>
<body>

    <style>
        a:link {
            color: blue;
            text-decoration: none;
        }

        a:visited {
            color: purple;
            text-decoration: none;
        }

        a:active {
            color: green;
            text-decoration: none;
        }

        a:focus {
            color: orange;
            text-decoration: none;
        }
        a:hover {
            color: red;
            background-color: yellow;
            text-decoration: underline;
        }
    </style>

    <div>
        <a href="https://www.zomato.com/" target="_blank">Zomato</a>
        <a href="https://www.swiggy.com/" target="_blank">Swiggy</a>
        <a href="https://www.airbnb.co.in/" target="_blank">Airbnb</a>
        <a href="https://www.decodecrafters.in/" target="_blank">Decode Crafters</a>
    </div>
</body>
</html>
