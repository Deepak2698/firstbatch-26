<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS</title>

    <!-- External CSS -->
     <link rel="stylesheet" href="./external_css.css">
</head>
<body>
    <div>
        <!-- Ways for adding css -->

        <!-- Inline CSS -->
         <p style="color: brown;
                   background-color: aliceblue;">
            This is an example of inline css
        </p>

        <!-- Internal CSS -->

        <style>

            #int-css{
                background-color: bisque;
                color: rgb(230, 6, 6);
            }

        </style>
        <p id="int-css">This is an example of Internal CSS</p>

        <!-- External CSS -->

        <p class="ext-css">This is an example of External CSS </p>
    </div>
</body>
</html>
