    <div style="height: 3000px;">
        <h1>Position</h1>

        <!-- Property values: static, relative, fixed, absolute, sticky -->

        <!-- static 
            
                The default position for all elements. 
                Static positioned elements are not affected by the 
                top, bottom, left, and right properties. 
                They are positioned according to the normal flow of the document.
                
        -->

        <!-- absolute -->
        <div style="position: absolute;
